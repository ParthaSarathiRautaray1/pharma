name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Dummy values so env validation passes during build
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
          JWT_ACCESS_SECRET: ci-only-secret-not-used-in-deployments!
          JWT_REFRESH_SECRET: ci-only-secret-not-used-in-deployment2!
          APP_URL: http://localhost:5173
          API_URL: http://localhost:5000
          CORS_ORIGINS: http://localhost:5173

  # Deployment is handled by Vercel (web) and Render (api) via their
  # GitHub integrations — pushes to main auto-deploy after CI passes.
